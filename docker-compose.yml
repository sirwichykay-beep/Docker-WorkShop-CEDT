services:
  web:
    # build image จาก Dockerfile ในโฟลเดอร์ปัจจุบัน และเปิดพอร์ต 3000
    build: .
    ports:
      - "3000:3000"

    # ตั้งค่า DATABASE_URL ให้เชื่อมกับ Postgres
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/workshop

    # รอให้ db พร้อมก่อนเริ่ม
    depends_on:
      db:
        condition: service_healthy

  db:
    # ใช้ postgres:16-alpine
    image: postgres:16-alpine

    # healthcheck ด้วย pg_isready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workshop"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

    # mount volume + init.sql
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    # env สำหรับสร้าง DB
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workshop

# ประกาศ volume
volumes:
  pgdata: